  image_picker: ^1.2.1
  intl: ^0.20.2
  pin_code_fields: ^8.0.1

  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  syncfusion_flutter_datepicker: ^31.2.10
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  package_info_plus: ^9.0.0
  flutter_rating_bar: ^4.0.1
  flutter_polyline_points: ^3.1.0
  map_launcher: ^4.4.2

  sqflite: ^2.4.2
  bottom_picker: ^4.1.1
  timelines_plus: ^1.0.8
  in_app_review: ^2.0.11
  share_plus: ^12.0.1
  mailer: ^6.6.0
  photo_view: ^0.15.0
  path_provider: ^2.1.5
  path: ^1.9.1
  video_compress: ^3.1.4
  video_player: ^2.10.1

  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  #payment dependency
