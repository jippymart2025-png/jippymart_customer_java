  google_api_headers: ^4.4.3
  package_info_plus: ^8.3.0
  location_platform_interface: ^4.0.0
  location_web: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
